services:
  - type: web
    name: barberparadise-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: barberparadise-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://barberparadise.vercel.app

databases:
  - name: barberparadise-db
    databaseName: barberparadise
    user: barberparadise
    plan: free
