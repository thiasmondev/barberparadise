services:
  - type: web
    name: barberparadise-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: barberparadise-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://barberparadise.fr
      - key: FRONTEND_URL
        value: https://barberparadise.fr
      - key: FROM_EMAIL
        value: contact@barberparadise.fr
      - key: FROM_NAME
        value: Barber Paradise
      - key: BREVO_SENDER_EMAIL
        value: contact@barberparadise.fr
      - key: BREVO_SENDER_NAME
        value: Barber Paradise
      - key: RESEND_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false

databases:
  - name: barberparadise-db
    databaseName: barberparadise
    user: barberparadise
    plan: free
