services:
  - type: web
    name: barberparadise-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # DATABASE_URL est géré manuellement dans le dashboard Render (base bp-database-prod).
      # sync: false garantit que ce Blueprint ne l'écrase JAMAIS lors d'un sync automatique.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://www.barberparadise.fr,https://barberparadise.fr
      - key: FRONTEND_URL
        value: https://www.barberparadise.fr
      - key: FROM_EMAIL
        value: noreply@barberparadise.fr
      - key: FROM_NAME
        value: Barber Paradise
      - key: BREVO_SENDER_EMAIL
        value: noreply@barberparadise.fr
      - key: BREVO_SENDER_NAME
        value: Barber Paradise
      - key: RESEND_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false

  # ─── Cron Job : Relances paiement quotidiennes ─────────────────────────────
  # Déclenche POST /api/cron/payment-due-reminders tous les jours à 07:00 UTC
  # = 09:00 heure de Paris en été (UTC+2).
  # En hiver (UTC+1, fin octobre → fin mars), l'appel arrive à 08:00 Paris.
  # Ajuster le schedule à "0 8 * * *" en hiver si l'heure exacte est critique.
  - type: cron
    name: bp-payment-reminders
    runtime: node
    schedule: "0 7 * * *"
    buildCommand: echo "No build needed"
    startCommand: node scripts/trigger-payment-reminders.js
    envVars:
      - key: BACKEND_URL
        value: https://barberparadise-backend.onrender.com
      - key: CRON_SECRET
        sync: false

# NOTE : la section "databases" a été intentionnellement supprimée.
# La base "barberparadise-db" (vide, créée par erreur lors du premier Blueprint)
# n'est plus référencée. La vraie base de production "bp-database-prod" est gérée
# manuellement dans le dashboard Render et ne doit JAMAIS être définie ici.
